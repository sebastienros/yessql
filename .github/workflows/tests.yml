name: Tests

on:
  workflow_call:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:

  sqlite:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Sqlite
            filter: YesSql.Tests.SqliteTests
            framework: net8.0
          - name: Sqlite
            filter: YesSql.Tests.SqliteTests
            framework: net10.0
          - name: Sqlite Legacy Identity
            filter: YesSql.Tests.SqliteLegacyIdentityTests
            framework: net8.0
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          10.0.x
    - name: Build
      run: dotnet build --configuration Release
    - name: Test - ${{ matrix.name }} ${{ matrix.framework }}
      run: dotnet test --configuration Release --filter-class ${{ matrix.filter }} --no-restore --no-build --framework ${{ matrix.framework }}

  postgresql:
    runs-on: ubuntu-latest
    env:
      POSTGRESQL_CONNECTION_STRING: Server=localhost;Port=5432;Database=yessql;User Id=root;Password=Password12!;
    services:
      postgres:
        image: postgres:11
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: Password12!
          POSTGRES_DB: yessql
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: PostgresQL
            filter: YesSql.Tests.PostgreSqlTests
            framework: net8.0
          - name: PostgresQL
            filter: YesSql.Tests.PostgreSqlTests
            framework: net10.0
          - name: PostgresQL Legacy Identity - No Schema
            filter: YesSql.Tests.PostgreSqlLegacyIdentityTests
            framework: net8.0
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          10.0.x
    - name: Build
      run: dotnet build --configuration Release
    - name: Test - ${{ matrix.name }} ${{ matrix.framework }}
      run: dotnet test --configuration Release --filter-class ${{ matrix.filter }} --no-restore --no-build --framework ${{ matrix.framework }}

  mysql:
    runs-on: ubuntu-latest
    env:
      MYSQL_CONNECTION_STRING: server=localhost;uid=root;pwd=Password12!;database=yessql;
    services:
      mysql:
        image: mysql:8
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: yessql
          MYSQL_ROOT_PASSWORD: Password12!
        options: --health-cmd "mysqladmin ping" --health-interval 10s --health-timeout 5s --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        framework: [ net8.0, net10.0 ]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          10.0.x
    - name: Build
      run: dotnet build --configuration Release
    - name: Test - MySQL ${{ matrix.framework }}
      run: dotnet test --configuration Release --filter-class YesSql.Tests.MySqlTests --no-restore --no-build --framework ${{ matrix.framework }}

  sqlserver:
    runs-on: ubuntu-latest
    env:
      SQLSERVER_2019_CONNECTION_STRING: Server=localhost;Database=tempdb;User Id=sa;Password=Password12!;Encrypt=false;
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2019-latest
        ports:
          - 1433:1433
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: Password12!
    strategy:
      fail-fast: false
      matrix:
        framework: [ net8.0, net10.0 ]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          10.0.x
    - name: Build
      run: dotnet build --configuration Release
    - name: Test - SQL Server 2019 ${{ matrix.framework }}
      run: dotnet test --configuration Release --filter-class YesSql.Tests.SqlServer2019Tests --no-restore --no-build --framework ${{ matrix.framework }}
